name: Automated Pytest Regression Suite

# Run this script automatically every time someone pushes code to the 'main' branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-automation:
    # Use a clean, isolated cloud machine running Linux (Ubuntu)
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone your code from GitHub into this cloud machine
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Set up a stable environment running Python 3.11
    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Upgrade pip and install pytest
    - name: Install Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # Step 4: Run the test suite with verbose output
    - name: Execute Pytest Suite
      run: |
        pytest -v